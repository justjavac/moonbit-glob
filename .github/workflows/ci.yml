name: ci

on: [push, pull_request]

permissions:
  contents: read
  id-token: write

jobs:
  stable:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # - macos-13
          - windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        if: ${{ matrix.os == 'windows-latest' }}
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: moon version
        run: |
          moon version --all

      - name: moon install
        run: |
          moon update
          moon install

      - name: moon info
        run: |
          moon info --target wasm,wasm-gc,js,native
          git diff --exit-code

      - name: moon check
        run: moon check --deny-warn

      - name: format check
        run: |
          moon fmt --check

      - name: Run moon test
        run: |
          moon test

      - name: Generate coverage report
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          moon coverage analyze --target-dir _coverage -p justjavac/glob -- -f cobertura -o _coverage/coverage.xml

      - name: Upload coverage to Codecov
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: _coverage/coverage.xml
          disable_search: true
          fail_ci_if_error: false

      - name: moon build
        run: |
          moon build

  nightly:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          # - macos-13
          - windows-latest
    continue-on-error: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: install
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash -s nightly
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: install on windows
        if: ${{ matrix.os == 'windows-latest' }}
        env:
          MOONBIT_INSTALL_VERSION: nightly
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser; irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "C:\Users\runneradmin\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: moon version
        run: |
          moon version --all

      - name: moon install
        run: |
          moon update
          moon install

      - name: moon info
        run: |
          moon info --target wasm,wasm-gc,js,native
          git diff --exit-code

      - name: moon check
        run: moon check --deny-warn

      - name: format check
        run: |
          moon fmt --check

      - name: Run moon test
        run: |
          moon test

      - name: moon build
        run: |
          moon build
